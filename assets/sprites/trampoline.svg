<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Батут. Заменяешь на свою картинку? Положи файл с тем же именем. -->
  <ellipse cx="32" cy="54" rx="15" ry="4" fill="#000000" opacity="0.13"/>
  <!-- боковой торец батута (объём) -->
  <ellipse cx="32" cy="34" rx="20" ry="20" fill="#2E9E8A"/>
  <!-- обод-пружина -->
  <ellipse cx="32" cy="31" rx="20" ry="20" fill="#3FB6A0"/>
  <!-- штрихи пружин по периметру обода -->
  <g stroke="#2E9E8A" stroke-width="2" stroke-linecap="round">
    <line x1="32" y1="12" x2="32" y2="18"/>
    <line x1="46.1" y1="16.9" x2="42.7" y2="21.6"/>
    <line x1="51" y1="31" x2="45" y2="31"/>
    <line x1="46.1" y1="45.1" x2="42.7" y2="40.4"/>
    <line x1="32" y1="50" x2="32" y2="44"/>
    <line x1="17.9" y1="45.1" x2="21.3" y2="40.4"/>
    <line x1="13" y1="31" x2="19" y2="31"/>
    <line x1="17.9" y1="16.9" x2="21.3" y2="21.6"/>
  </g>
  <!-- мат (прыжковая поверхность) -->
  <ellipse cx="32" cy="31" rx="14" ry="14" fill="#8FE6D5" stroke="#2E9E8A" stroke-width="2"/>
  <!-- лапка в центре — тот же "кошачий" символ, что на монете и щите -->
  <path d="M32 25.5 Q29.9 22.5 27.5 24.3 Q25.4 26 27.7 28.6 L32 33.2 L36.3 28.6 Q38.6 26 36.5 24.3 Q34.1 22.5 32 25.5 Z"
        fill="#2E9E8A" opacity="0.85"/>
  <!-- блик -->
  <ellipse cx="24" cy="21" rx="3.5" ry="5" fill="#FFFFFF" opacity="0.5" transform="rotate(-25 24 21)"/>
</svg>
