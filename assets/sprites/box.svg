  <!-- задняя стенка -->
  <path d="M12 22 L52 22 L52 30 L12 30 Z" fill="#B8874F"/>
  <!-- внутренность -->
  <path d="M14 24 L50 24 L47 50 L17 50 Z" fill="#7A5533"/>
  <!-- передняя стенка -->
  <path d="M12 30 L52 30 L49 54 L15 54 Z" fill="#D9A868"/>
  <path d="M12 30 L52 30 L51.7 32.5 L12.3 32.5 Z" fill="#E8C08A"/>
  <!-- скотч -->
  <path d="M28 30 L36 30 L35.4 54 L28.6 54 Z" fill="#C08F55" opacity="0.55"/>
  <!-- откинутые створки -->
  <path d="M12 22 L4 16 L20 14 L26 21 Z" fill="#E8C08A" stroke="#B8874F" stroke-width="0.8"/>
  <path d="M52 22 L60 16 L44 14 L38 21 Z" fill="#E8C08A" stroke="#B8874F" stroke-width="0.8"/>
  <!-- сердечко: сигнал «здесь безопасно» -->
  <path d="M32 39 Q29.5 35.5 26.8 37.6 Q24.4 39.5 27 42.6 L32 47.6 L37 42.6 Q39.6 39.5 37.2 37.6 Q34.5 35.5 32 39 Z" fill="#F2856D"/>
